<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surgical Microscope — eye-sim-lab</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; color: #e6edf3; font-family: system-ui, sans-serif; overflow: hidden; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,0.6); padding: 12px 16px; border-radius: 8px;
        border: 1px solid #30363d; font-size: 13px; max-width: 280px;
      }
      #hud h1 { margin: 0 0 6px; font-size: 15px; }
      #hud p { margin: 4px 0; color: #8b949e; }
      #hud kbd { background: #161b22; padding: 1px 6px; border-radius: 3px; border: 1px solid #30363d; font-size: 11px; }
      #stats { position: fixed; bottom: 12px; left: 12px; font-size: 12px; color: #58a6ff; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="hud">
      <h1>Microscópio Cirúrgico</h1>
      <p><kbd>scroll</kbd> zoom · <kbd>arrastar</kbd> orbitar</p>
      <p><kbd>click</kbd> na lente: fragmenta cristalino (simulação de faco)</p>
      <p><kbd>R</kbd> resetar</p>
    </div>
    <div id="stats">Fragmentos removidos: <span id="frags">0</span> / 12</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
