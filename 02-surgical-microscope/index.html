<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02 — Under the Scope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="grain"></div>

    <!-- Top-left editorial badge -->
    <div class="hud hud-tl">
      <div class="numeral">02</div>
      <div class="title-stack">
        <h1 class="display">Under the<br/><em>scope.</em></h1>
        <p class="caption">microscópio cirúrgico — segmento anterior · facectomia didática</p>
      </div>
    </div>

    <!-- Top-right meta -->
    <div class="hud hud-tr">
      <div class="readout-grid">
        <div class="r">
          <span class="label">Target</span>
          <span class="val">OD · anterior</span>
        </div>
        <div class="r">
          <span class="label">Mode</span>
          <span class="val">phaco · manual</span>
        </div>
        <div class="r">
          <span class="label">Fragments</span>
          <span class="val amber"><span id="frags">0</span> <i>/ 12</i></span>
        </div>
      </div>
    </div>

    <!-- Reticle crosshair overlay -->
    <svg class="reticle" viewBox="0 0 100 100" preserveAspectRatio="none">
      <circle cx="50" cy="50" r="28" fill="none" stroke="currentColor" stroke-width="0.12" stroke-dasharray="1 2" />
      <circle cx="50" cy="50" r="14" fill="none" stroke="currentColor" stroke-width="0.12" />
      <line x1="50" y1="36" x2="50" y2="44" stroke="currentColor" stroke-width="0.15" />
      <line x1="50" y1="56" x2="50" y2="64" stroke="currentColor" stroke-width="0.15" />
      <line x1="36" y1="50" x2="44" y2="50" stroke="currentColor" stroke-width="0.15" />
      <line x1="56" y1="50" x2="64" y2="50" stroke="currentColor" stroke-width="0.15" />
    </svg>

    <!-- Corner ticks -->
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <!-- Bottom controls strip -->
    <div class="hud hud-bl">
      <div class="controls-strip">
        <div class="ctrl"><span class="label">Scroll</span><span class="val">zoom</span></div>
        <div class="sep">·</div>
        <div class="ctrl"><span class="label">Drag</span><span class="val">orbit</span></div>
        <div class="sep">·</div>
        <div class="ctrl"><span class="label">Click</span><span class="val">phaco</span></div>
        <div class="sep">·</div>
        <div class="ctrl"><span class="label">R</span><span class="val">reset</span></div>
      </div>
    </div>

    <div class="hud hud-br">
      <span class="eyebrow dim">02 / 04 · eye-sim-lab</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
